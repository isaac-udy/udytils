name: Publish
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.3.0)'
        required: true
        type: string
jobs:
  publish:
    name: Release build and publish
    runs-on: macOS-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Update udytilsVersionName and commit
        env:
          NEW_VERSION: ${{ inputs.version }}
          BRANCH: ${{ github.ref_name }}
        run: |
          sed -i.bak "s/^udytilsVersionName = .*/udytilsVersionName = \"$NEW_VERSION\"/" gradle/libs.versions.toml
          rm gradle/libs.versions.toml.bak
          if git diff --quiet gradle/libs.versions.toml; then
            echo "Version already $NEW_VERSION, no commit needed"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add gradle/libs.versions.toml
            git commit -m "Release v$NEW_VERSION"
            git push origin "HEAD:$BRANCH"
          fi
      - name: Publish to MavenCentral
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
      - name: Create release tag
        env:
          NEW_VERSION: ${{ inputs.version }}
        run: |
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
